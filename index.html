<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yukon climate dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div>
      <p class="eyebrow">Climate dashboard</p>
      <h1>Yukon climate indicators</h1>
      <p class="lead">A gallery of verified climate plots generated from the latest validated dataset.</p>
    </div>
  </header>

  <main class="page-wrap">
    <section class="toolbar">
      <label for="searchInput">Search</label>
      <input id="searchInput" type="search" placeholder="Search indicators, topics, or tags" />
    </section>

    <section id="cards" class="card-grid" aria-live="polite"></section>
    <p id="emptyState" class="empty-state" hidden>No indicators match your search.</p>
  </main>

  <footer class="site-footer">
    <span>Static dashboard generated from verified plot outputs.</span>
  </footer>

  <script src="app.js"></script>
  <script>initIndicatorHome();</script>
</body>
</html>
