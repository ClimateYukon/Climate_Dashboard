<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Daily temperature observations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --page-bg: #f6f8fb;
      --card-bg: #ffffff;
      --text: #1f2933;
      --muted: #5f6c7b;
      --border: #d8dee6;
      --accent: #1d4f91;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--page-bg);
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px 0;
      font-size: 1.7rem;
      line-height: 1.2;
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
      max-width: 850px;
    }

    .back-link {
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
      font-weight: 600;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.06);
      padding: 16px;
      margin-bottom: 16px;
    }

    .controls {
      display: grid;
      grid-template-columns: 260px 170px 130px 170px 170px 190px;
      gap: 12px;
      align-items: end;
      justify-content: center;
      max-width: 1120px;
      margin: 0 auto;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 0.86rem;
      color: var(--muted);
      font-weight: 600;
    }

    select {
      min-width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #ffffff;
      font-size: 0.95rem;
    }

    .comparison-options {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.92rem;
    }

    .comparison-options label {
      color: var(--text);
      font-weight: 500;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    #graph-title {
      text-align: center;
      margin-top: 8px;
      margin-bottom: 6px;
    }

    #graph-title .main-title {
      font-weight: 700;
      font-size: 1.15rem;
    }

    #graph-title .sub-title {
      font-size: 0.88rem;
      color: var(--muted);
      margin-top: 2px;
    }

    #custom-legend {
      display: grid;
      grid-template-columns: repeat(4, max-content);
      justify-content: center;
      gap: 54px;
      padding: 6px 18px 2px 18px;
      max-width: 1080px;
      margin: 0 auto 4px auto;
    }

    .legend-heading {
      font-weight: 700;
      font-size: 0.82rem;
      margin-bottom: 4px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      font-size: 0.84rem;
      white-space: nowrap;
      line-height: 1.35;
    }

    .legend-swatch-line {
      display: inline-block;
      width: 28px;
      height: 0;
      border-top: 3px solid;
      vertical-align: middle;
      margin-right: 8px;
    }

    .legend-swatch-vline {
      display: inline-block;
      width: 28px;
      height: 18px;
      position: relative;
      vertical-align: middle;
      margin-right: 8px;
      flex: 0 0 28px;
    }

    .legend-swatch-vline::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 1px;
      bottom: 1px;
      transform: translateX(-50%);
      border-left: 4px solid currentColor;
      opacity: var(--legend-opacity, 1);
    }

    .legend-swatch-dot {
      display: inline-block;
      width: 28px;
      height: 18px;
      position: relative;
      vertical-align: middle;
      margin-right: 8px;
      flex: 0 0 28px;
    }

    .legend-swatch-dot::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 9px;
      height: 9px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: currentColor;
      opacity: var(--legend-opacity, 1);
      box-shadow: 0 0 0 1px white;
    }

    .legend-swatch-band {
      display: inline-block;
      width: 28px;
      height: 12px;
      border: 1px solid rgba(0,0,0,0.08);
      vertical-align: middle;
      margin-right: 8px;
    }

    .legend-swatch-diamond {
      display: inline-block;
      width: 8px;
      height: 8px;
      transform: rotate(45deg);
      vertical-align: middle;
      margin-left: 10px;
      margin-right: 18px;
    }

    #temperature-plot {
      width: 100%;
      height: auto;
      min-height: 0;
    }

    .status {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.4;
    }

    .error {
      color: #9b1c1c;
      background: #fff1f1;
      border: 1px solid #f2b8b8;
      padding: 12px;
      border-radius: 10px;
      display: none;
      margin-bottom: 16px;
    }

    .summary-card h2,
    .table-card h2 {
      margin: 0 0 10px 0;
      font-size: 1.1rem;
    }

    #temperature-summary {
      margin: 0;
      font-size: 1rem;
      line-height: 1.5;
    }

    #temperature-summary p {
      margin: 0 0 8px 0;
    }

    #temperature-summary p:last-child {
      margin-bottom: 0;
    }

    .table-wrap {
      overflow-x: auto;
    }

    #ranking-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }

    #ranking-table th,
    #ranking-table td {
      border-bottom: 1px solid var(--border);
      padding: 8px 10px;
      text-align: right;
      white-space: nowrap;
    }

    #ranking-table th {
      background: #eef2f6;
      font-weight: 700;
    }

    #ranking-table th:first-child,
    #ranking-table td:first-child,
    #ranking-table th:nth-child(2),
    #ranking-table td:nth-child(2) {
      text-align: left;
    }

    #ranking-table tr.selected-ranking-row {
      background: #fff3d6;
      font-weight: 700;
    }

    @media (max-width: 1100px) {
      .controls {
        grid-template-columns: 1fr 1fr 1fr;
        max-width: 760px;
      }

      #custom-legend {
        grid-template-columns: repeat(2, max-content);
        gap: 24px 54px;
      }
    }

    @media (max-width: 900px) {
      .controls {
        grid-template-columns: 1fr 1fr;
        max-width: 620px;
      }

      #custom-legend {
        grid-template-columns: 1fr 1fr;
        justify-content: stretch;
      }
    }

    @media (max-width: 760px) {
      main {
        padding: 14px;
      }

      .top-bar {
        flex-direction: column;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      #custom-legend {
        grid-template-columns: 1fr;
        justify-content: stretch;
        gap: 12px;
      }

      #temperature-plot {
        height: auto;
        min-height: 0;
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="top-bar">
      <div>
        <h1>Daily temperature observations</h1>
        <p class="subtitle">
          Compare recent daily temperatures with normal values, extreme ranges, and daily records.
        </p>
      </div>
      <a class="back-link" href="../index.html">Back to dashboard</a>
    </div>

    <div id="error-box" class="error"></div>

    <section class="card">
      <div class="controls">
        <div class="control">
          <label for="station-select">Station</label>
          <select id="station-select"></select>
        </div>

        <div class="control">
          <label for="mode-select">View</label>
          <select id="mode-select"></select>
        </div>

        <div class="control">
          <label for="year-select">Year</label>
          <select id="year-select"></select>
        </div>

        <div class="control" id="month-control">
          <label for="month-select">Month</label>
          <select id="month-select"></select>
        </div>

        <div class="control" id="season-control">
          <label for="season-select">Season</label>
          <select id="season-select"></select>
        </div>

        <div class="control">
          <label>Comparison</label>
          <div class="comparison-options">
            <label>
              <input type="radio" name="comparison-view" value="average" checked>
              Daily average
            </label>
            <label>
              <input type="radio" name="comparison-view" value="low_high">
              Daily lows/highs
            </label>
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <div id="graph-title"></div>
      <div id="custom-legend"></div>
      <div id="temperature-plot"></div>
    </section>

    <section class="card summary-card" id="summary-card">
      <h2>Temperature summary</h2>
      <div id="temperature-summary">Select a station and period to view the summary.</div>
    </section>

    <section class="card table-card">
      <h2>Historical ranking</h2>
      <div class="table-wrap">
        <table id="ranking-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Year</th>
              <th>Avg temp (°C)</th>
              <th>Anomaly (°C)</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="card status" id="data-status">
      Loading data...
    </section>
  </main>

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="ahccd-temperature.js"></script>
</body>
</html>
